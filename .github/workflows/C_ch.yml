name: EPG CanalPlus CH 

on:
  schedule:
    - cron: "0 9 * * *"   # تحديث تلقائي كل يوم الساعة 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  epg_canalplus_ch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clone EPG repo
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          npm install

      - name: Parse CanalPlus channels (CH)
        run: |
          cd epg
          npm run channels:parse --- \
            --config=./sites/canalplus.com/canalplus.com.config.js \
            --output=./sites/canalplus.com/canalplus.com_ch.channels.xml \
            --set=country:ch

      - name: Generate 7-day EPG (canalplus.com CH)
        run: |
          cd epg
          npm run grab --- \
            --channels=sites/canalplus.com/canalplus.com_ch.channels.xml \
            --days=7

      - name: Save XML
        run: |
          mkdir -p public
          cp epg/guide.xml public/epg-canalplus-ch-7days.xml

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-canalplus-ch-7days.xml
          git diff-index --quiet HEAD || git commit -m "Update 7-day EPG canalplus.com CH"
          git pull --rebase origin main
          git push origin main
