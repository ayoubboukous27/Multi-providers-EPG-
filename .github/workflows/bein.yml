name: Update beIN EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *" # كل 6 ساعات (يمكن تغييره)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js (latest LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm install

      - name: 📂 Navigate to epg folder
        run: cd epg

      - name: ▶️ Run grab
        run: |
          cd epg
          npm run grab -- --site=bein.com --lang=en

      - name: ▶️ Parse channels
        run: |
          cd epg
          npm run channels:parse -- \
            --config=./sites/bein.com/bein.com.config.js \
            --output=./sites/bein.com/bein.com_en.channels.xml \
            --set=lang:en

      - name: 💾 Commit & Push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add .
          git commit -m "Update beIN EPG" || echo "No changes to commit"
          git push
