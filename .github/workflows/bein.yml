name: beIN MENA AR EPG

on:
  schedule:
    - cron: "0 5 * * *"  # يوميًا الساعة 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate_bein_ar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "node"

      - name: Clone iptv-org/epg
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull
          fi

      - name: Install dependencies
        run: |
          cd epg
          npm install
          npm install xml2js

      - name: Grab beIN MENA AR EPG
        run: |
          cd epg
          npx tsx scripts/commands/epg/grab.ts \
            --channels=sites/bein.com/beinsports.com_mena-ar.channels.xml \
            --output=guide_bein_ar.xml \
            --days=7

      - name: Set Display Name = Channel ID
        run: |
          cd epg
          node << 'EOF'
          const fs = require('fs');
          const xml2js = require('xml2js');

          const epgXml = fs.readFileSync('guide_bein_ar.xml', 'utf-8');
          const parser = new xml2js.Parser();
          parser.parseString(epgXml, (err, epgRes) => {
            if (err) throw err;

            if (epgRes.tv && epgRes.tv.channel) {
              epgRes.tv.channel.forEach(ch => {
                const id = ch.$.id;
                if (ch['display-name']) {
                  ch['display-name'][0] = id;
                } else {
                  ch['display-name'] = [id];
                }
              });
            }

            const builder = new xml2js.Builder({
              xmldec: { version: '1.0', encoding: 'UTF-8' }
            });
            const xmlOut = builder.buildObject(epgRes);
            fs.writeFileSync('../public/epg-bein-mena-ar.xml', xmlOut, 'utf-8');
          });
          EOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-bein-mena-ar.xml
          git diff-index --quiet HEAD || git commit -m "Update beIN AR EPG (Display Name = Channel ID)"
          git pull --rebase origin main
          git push origin main
