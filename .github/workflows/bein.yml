name: Update beIN EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *" # كل 6 ساعات

permissions:
  contents: write

jobs:
  update-bein:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo الخاص بك
      - name: 📥 Checkout this repo
        uses: actions/checkout@v4

      # Setup Node.js LTS
      - name: 🟢 Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      # Clone كامل مستودع iptv-org/epg
      - name: 📂 Clone iptv-org/epg
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git epg

      # تثبيت dependencies مع postinstall
      - name: 📦 Install dependencies
        run: |
          cd epg
          npm install

      # Run grab لموقع bein.com
      - name: ▶️ Run grab for bein.com
        run: |
          cd epg
          npm run grab -- --site=bein.com --lang=en

      # Parse channels إلى XML
      - name: ▶️ Parse channels for bein.com
        run: |
          cd epg
          npm run channels:parse -- \
            --config=./sites/bein.com/bein.com.config.js \
            --output=./sites/bein.com/bein.com_en.channels.xml \
            --set=lang:en

      # Copy XML الناتج إلى مجلد output في repo الخاص بك
      - name: 📂 Copy XML to repo
        run: |
          mkdir -p output
          cp epg/sites/bein.com/bein.com_en.channels.xml output/bein.com_en.channels.xml

      # Commit & Push الملف فقط
      - name: 💾 Commit & Push XML only
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add output/bein.com_en.channels.xml
          git commit -m "Update beIN EPG" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:master
