name: Grab beIN EPG AR

on:
  schedule:
    - cron: "0 6 * * *"  # تحديث يوميًا الساعة 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grab_bein_ar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --------------------------
      # Install dependencies
      # --------------------------
      - name: Install dependencies
        run: |
          npm install

      # --------------------------
      # Grab EPG for beIN (AR)
      # --------------------------
      - name: Grab beIN AR EPG
        run: |
          npm run grab --- --site=bein.com --lang=ar

      # --------------------------
      # Parse channels & generate XML
      # --------------------------
      - name: Parse channels
        run: |
          npm run channels:parse --- --config=./sites/bein.com/bein.com.config.js \
          --output=./sites/bein.com/bein.com_ar.channels.xml --set=lang:ar

      # --------------------------
      # Commit & Push
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sites/bein.com/bein.com_ar.channels.xml
          git diff-index --quiet HEAD || git commit -m "Update beIN AR EPG with programmes"
          git pull --rebase origin main
          git push origin main
