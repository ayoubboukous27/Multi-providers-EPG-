name: Update beIN EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *" # كل 6 ساعات

permissions:
  contents: write

jobs:
  update-bein:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout this repo
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: 📂 Clone bein.com from iptv-org/epg
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/iptv-org/epg.git epg
          cd epg
          git sparse-checkout set sites/bein.com

      - name: 📦 Install dependencies
        run: |
          cd epg
          npm install

      - name: ▶️ Run grab
        run: |
          cd epg
          npm run grab -- --site=bein.com --lang=en

      - name: ▶️ Parse channels
        run: |
          cd epg
          npm run channels:parse -- \
            --config=./sites/bein.com/bein.com.config.js \
            --output=./sites/bein.com/bein.com_en.channels.xml \
            --set=lang:en

      - name: 💾 Commit & Push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add epg/sites/bein.com/*.xml
          git commit -m "Update beIN EPG" || echo "No changes to commit"
          git push
