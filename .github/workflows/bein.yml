name: Grab beIN Sports EN EPG (Full Program via Clone)

on:
  schedule:
    - cron: "0 5 * * *"  # تحديث يوميًا الساعة 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grab_bein_en:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # Checkout repository
      # --------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------
      # Setup Node.js (latest stable)
      # --------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --------------------------
      # Clone iptv-org/epg repository
      # --------------------------
      - name: Clone iptv-org/epg
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull

      # --------------------------
      # Install dependencies
      # --------------------------
      - name: Install dependencies
        run: |
          cd epg
          npm install

      # --------------------------
      # Grab beIN Sports English EPG (Full Program)
      # --------------------------
      - name: Grab beIN Sports EN EPG
        run: |
          cd epg
          # هذا الأمر يستخدم سكريبت grab الأصلي داخل repo لإخراج كل البرامج
          npm run grab --- --site=bein.com --lang=en

      # --------------------------
      # Save XML output
      # --------------------------
      - name: Save XML
        run: |
          mkdir -p public
          cp epg/guide.xml public/epg-bein-en.xml
          echo "✅ Full EPG saved to public/epg-bein-en.xml"

      # --------------------------
      # Commit & Push
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-bein-en.xml
          git diff-index --quiet HEAD || git commit -m "Update beIN Sports EN Full EPG"
          git pull --rebase origin main
          git push origin main
