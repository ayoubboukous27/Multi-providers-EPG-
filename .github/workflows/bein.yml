name: Grab beIN AR EPG

on:
  schedule:
    - cron: "0 6 * * *"  # تحديث يوميًا الساعة 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grab_bein_ar:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # Checkout repository
      # --------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------
      # Setup Node.js
      # --------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --------------------------
      # Install web-grab
      # --------------------------
      - name: Install web-grab
        run: npm install web-grab@latest

      # --------------------------
      # Grab beIN Arabic EPG
      # --------------------------
      - name: Grab beIN AR EPG
        run: |
          mkdir -p epg
          npx web-grab --- --site=bein.com --lang=ar
          # سينتج guide.xml في المجلد الحالي

      # --------------------------
      # Save XML
      # --------------------------
      - name: Save XML
        run: |
          mkdir -p public
          cp guide.xml public/epg-bein-ar.xml
          echo "✅ EPG saved to public/epg-bein-ar.xml"

      # --------------------------
      # Commit & Push
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-bein-ar.xml
          git diff-index --quiet HEAD || git commit -m "Update beIN AR EPG"
          git pull --rebase origin main
          git push origin main
