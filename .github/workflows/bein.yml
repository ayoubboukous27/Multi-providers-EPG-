name: Generate beIN MENA AR EPG (7 days)

on:
  schedule:
    - cron: "0 5 * * *"  # تحديث يوميًا الساعة 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grab_bein_mena_ar:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # Checkout repository
      # --------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------
      # Setup Node.js latest stable
      # --------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "node"

      # --------------------------
      # Clone iptv-org/epg
      # --------------------------
      - name: Clone iptv-org/epg
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull
          fi

      # --------------------------
      # Install dependencies
      # --------------------------
      - name: Install dependencies
        run: |
          cd epg
          npm install

      # --------------------------
      # Parse channel list (AR)
      # --------------------------
      - name: Generate channels XML (AR)
        run: |
          cd epg
          npx tsx scripts/commands/epg/channels.ts \
            --config=sites/bein.com/bein.com.config.js \
            --output=sites/bein.com/bein.com_ar.channels.xml \
            --set=lang:ar

      # --------------------------
      # Grab EPG for AR channels
      # --------------------------
      - name: Grab beIN EPG (AR)
        run: |
          cd epg
          npx tsx scripts/commands/epg/grab.ts \
            --channels=sites/bein.com/bein.com_ar.channels.xml \
            --output=guide_bein_ar.xml \
            --days=7

      # --------------------------
      # Save XML
      # --------------------------
      - name: Save EPG
        run: |
          mkdir -p public
          cp epg/guide_bein_ar.xml public/epg-bein-mena-ar.xml

      # --------------------------
      # Commit & Push
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-bein-mena-ar.xml
          git diff-index --quiet HEAD || git commit -m "Update beIN MENA AR EPG"
          git pull --rebase origin main
          git push origin main
