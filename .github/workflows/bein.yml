name: Bein.com Arabic EPG from Updated Channels

on:
  schedule:
    - cron: "0 7 * * *"  # تحديث يوميًا الساعة 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grab_bein_ar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --------------------------
      # Clone iptv-org/epg (تصحيح if)
      # --------------------------
      - name: Clone iptv-org/epg
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull
          fi

      - name: Install dependencies
        run: |
          cd epg
          npm install

      # --------------------------
      # Download updated channels XML
      # --------------------------
      - name: Download updated Bein Arabic channels
        run: |
          mkdir -p epg/sites/bein.com
          curl -L "https://raw.githubusercontent.com/ayoubboukous27/Multi-providers-EPG-/refs/heads/main/data/bein.com_ar.channels.xml" -o epg/sites/bein.com/bein.com_ar.channels.xml

      # --------------------------
      # Grab EPG using updated channels XML
      # --------------------------
      - name: Grab Bein EPG (Arabic)
        run: |
          cd epg
          npm run grab --- --channels=sites/bein.com/bein.com_ar.channels.xml --lang=ar

      # --------------------------
      # Save XML
      # --------------------------
      - name: Save XML
        run: |
          mkdir -p public
          cp epg/guide.xml public/epg-bein-ar.xml

      # --------------------------
      # Commit & Push
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-bein-ar.xml
          git diff-index --quiet HEAD || git commit -m "Update Bein.com Arabic EPG from updated channels"
          git pull --rebase origin main
          git push origin main
