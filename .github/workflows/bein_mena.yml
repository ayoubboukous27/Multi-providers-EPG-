name: Generate 7-day EPG beIN Sports MENA AR

on:
  schedule:
    - cron: "0 9 * * *"   # تحديث يوميًا الساعة 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  epg_beinsports:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --------------------------
      # Clone iptv-org/epg
      # --------------------------
      - name: Clone EPG repository
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull
          fi

      # --------------------------
      # Install npm dependencies
      # --------------------------
      - name: Install EPG dependencies
        run: |
          cd epg
          npm install

      # --------------------------
      # Generate channels XML
      # --------------------------
      - name: Parse beINSports channels (MENA, AR)
        run: |
          cd epg
          npm run channels:parse --- \
            --config=./sites/beinsports.com/beinsports.com.config.js \
            --output=./sites/beinsports.com/beinsports.com_mena-ar.channels.xml \
            --set=region:mena --set=lang:ar

      # --------------------------
      # Generate 7-day EPG
      # --------------------------
      - name: Generate 7-day EPG (beINSports MENA AR)
        run: |
          cd epg
          npm run grab --- \
            --channels=sites/beinsports.com/beinsports.com_mena-ar.channels.xml \
            --days=7 \
            --lang=ar

      # --------------------------
      # Save XML
      # --------------------------
      - name: Save XML
        run: |
          mkdir -p public
          cp epg/guide.xml public/epg-beinsports-mena-ar-7days.xml

      # --------------------------
      # Commit & Push
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-beinsports-mena-ar-7days.xml
          git diff-index --quiet HEAD || git commit -m "Update 7-day EPG beINSports MENA AR"
          git pull --rebase origin main
          git push origin main
