name: EPG TV Blue Update

on:
  schedule:
    - cron: "0 4 * * *"  # تحديث يوميًا الساعة 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  epg_tv_blue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone EPG repo
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          npm install

      - name: Generate EPG (tv.blue.ch)
        run: |
          cd epg
          npm run grab --- --site=tv.blue.ch --days=15

      # --------------------------
      # Add logos: Blue Sports + RTS
      # --------------------------
      - name: Add logos to XML
        run: |
          node << 'EOF'
          const fs = require('fs');
          let xml = fs.readFileSync('epg/guide.xml', 'utf8');

          // روابط الشعارات
          const logosById = {
            "RTS1.ch@SD": "https://raw.githubusercontent.com/ayoubboukous27/Event/refs/heads/main/Logos/rts1.png",
            "RTS2.ch@SD": "https://raw.githubusercontent.com/ayoubboukous27/Event/refs/heads/main/Logos/rts2.png"
          };

          const blueLogo = "https://raw.githubusercontent.com/ayoubboukous27/Event/refs/heads/main/Logos/blue-sports.png";

          // استبدال أي شعار موجود لكل قناة محددة
          xml = xml.replace(/(<channel[^>]*>)([\s\S]*?)(<\/channel>)/gi, (match, start, middle, end) => {

            // أولاً: قنوات RTS1 و RTS2 حسب xmltv_id
            const idMatch = match.match(/id=["']([^"']+)["']/i);
            if (idMatch) {
              const channelId = idMatch[1];
              if (logosById[channelId]) {
                const cleaned = middle.replace(/<icon[^>]*\/>/gi, '');
                return `${start}<icon src="${logosById[channelId]}"/>${cleaned}${end}`;
              }
            }

            // ثانياً: أي قناة تحتوي اسمها "blue sport" (غير حساس لحالة الأحرف)
            if (/blue sport/i.test(middle)) {
              const cleaned = middle.replace(/<icon[^>]*\/>/gi, '');
              return `${start}<icon src="${blueLogo}"/>${cleaned}${end}`;
            }

            return match;
          });

          fs.writeFileSync('epg/guide.xml', xml);
          console.log('✅ Logos applied: RTS1, RTS2, and Blue Sports channels');
          EOF

      - name: Save XML
        run: |
          mkdir -p public
          cp epg/guide.xml public/epg-tv-blue.xml

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-tv-blue.xml
          git diff-index --quiet HEAD || git commit -m "Update EPG tv.blue.ch with Blue Sports + RTS logos"
          git pull --rebase origin main
          git push origin main
