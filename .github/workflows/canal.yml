name: EPG CanalPlus FR Update

on:
  schedule:
    - cron: "0 5 * * *"  # يوميًا الساعة 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  epg_canalplus_fr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone EPG repo
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          npm install

      - name: Parse CanalPlus channels (FR)
        run: |
          cd epg
          npm run channels:parse --- --config=./sites/canalplus.com/canalplus.com.config.js --output=./sites/canalplus.com/canalplus.com_fr.channels.xml --set=country:fr

      - name: Generate EPG (FR)
        run: |
          cd epg
          npm run grab --- --channels=sites/canalplus.com/canalplus.com_fr.channels.xml

      - name: Save XML
        run: |
          mkdir -p public
          cp epg/guide.xml public/epg-canalplus-fr.xml

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-canalplus-fr.xml
          git diff-index --quiet HEAD || git commit -m "Update EPG CanalPlus FR"
          git pull --rebase origin main
          git push origin main
