name: Grab CanalPlus FR EPG (gzip)

on:
  schedule:
    - cron: "0 6 * * *"  # تحديث يوميًا الساعة 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grab_canalplus_fr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --------------------------
      # Install dependencies
      # --------------------------
      - name: Install dependencies
        run: |
          npm install

      # --------------------------
      # Grab EPG for CanalPlus France
      # --------------------------
      - name: Grab CanalPlus FR EPG
        run: |
          npm run grab --- --site=canalplus.com --channels=canalplus.com_fr.channels.xml

      # --------------------------
      # Save & compress XML
      # --------------------------
      - name: Save & compress XML
        run: |
          mkdir -p public
          cp guide.xml public/epg-canalplus-fr.xml
          gzip -f public/epg-canalplus-fr.xml
          echo "✅ EPG saved and compressed to epg-canalplus-fr.xml.gz"

      # --------------------------
      # Commit & Push
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-canalplus-fr.xml.gz
          git diff-index --quiet HEAD || git commit -m "Update CanalPlus FR EPG (gzipped)"
          git pull --rebase origin main
          git push origin main
