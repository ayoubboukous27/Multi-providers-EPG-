name: Generate 7-day EPG France + Logos

on:
  schedule:
    - cron: "0 8 * * *"  # يوميًا الساعة 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  epg_france:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # Checkout repo
      # --------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------
      # Setup Node.js
      # --------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --------------------------
      # Clone iptv-org/epg
      # --------------------------
      - name: Clone EPG repository
        run: |
          if [ ! -d "epg" ]; then
            echo "📥 Cloning iptv-org/epg..."
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            echo "✅ epg repo exists, pulling latest..."
            git -C epg pull
          fi

      # --------------------------
      # Install npm dependencies inside epg
      # --------------------------
      - name: Install EPG dependencies
        run: |
          cd epg
          npm install

      # --------------------------
      # Generate 7-day EPG
      # --------------------------
      - name: Generate 7-day EPG (programme-tv.net)
        run: |
          cd epg
          npm run grab --- --site=programme-tv.net --days=7

      # --------------------------
      # Clone TV Logos repo and generate mapping
      # --------------------------
      - name: Clone TV Logos & generate mapping
        run: |
          if [ ! -d "tv-logos" ]; then
            git clone https://github.com/tv-logo/tv-logos.git
          else
            git -C tv-logos pull
          fi
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const franceDir = path.join(__dirname, 'tv-logos', 'countries', 'france');
          const files = fs.readdirSync(franceDir);
          const mapping = {};
          files.forEach(file => {
            const name = path.basename(file, path.extname(file)).toLowerCase();
            mapping[name] = `https://raw.githubusercontent.com/tv-logo/tv-logos/main/countries/france/${file}`;
          });
          fs.writeFileSync('logos-fr.json', JSON.stringify(mapping, null, 2));
          console.log('✅ logos-fr.json generated');
          EOF

      # --------------------------
      # Add logos to XML
      # --------------------------
      - name: Add logos to XML
        run: |
          node <<'EOF'
          const fs = require('fs');
          let xml = fs.readFileSync('epg/guide.xml', 'utf8');
          const logos = JSON.parse(fs.readFileSync('logos-fr.json', 'utf8'));
          for (const [channelName, logo] of Object.entries(logos)) {
            const regex = new RegExp(`(<channel[^>]*>(?:\\s*<display-name>)?${channelName}(?:</display-name>)?)</channel>`, 'gi');
            xml = xml.replace(regex, `$1<icon src="${logo}"/></channel>`);
          }
          fs.writeFileSync('epg/guide.xml', xml);
          console.log('✅ Logos added successfully');
          EOF

      # --------------------------
      # Save XML and compress
      # --------------------------
      - name: Save and compress XML
        run: |
          mkdir -p public
          cp epg/guide.xml public/epg-programme-tv-7days.xml
          gzip -c public/epg-programme-tv-7days.xml > public/epg-programme-tv-7days.xml.gz

      # --------------------------
      # Commit & push changes
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-programme-tv-7days.xml public/epg-programme-tv-7days.xml.gz logos-fr.json
          git diff-index --quiet HEAD || git commit -m "Update 7-day EPG with logos"
          git pull --rebase origin main
          git push origin main
