const { execSync } = require('child_process');
const fs = require('fs');
const path = require('path');

// ----------------------
// 1️⃣ Clone tv-logos repo
// ----------------------
const repoUrl = 'https://github.com/tv-logo/tv-logos.git';
const cloneDir = path.join(__dirname, 'tv-logos');

if (!fs.existsSync(cloneDir)) {
  console.log('📥 Cloning tv-logos repository...');
  execSync(`git clone ${repoUrl} ${cloneDir}`, { stdio: 'inherit' });
} else {
  console.log('✅ tv-logos repo already exists. Pulling latest changes...');
  execSync(`git -C ${cloneDir} pull`, { stdio: 'inherit' });
}

// ----------------------
// 2️⃣ Generate mapping for France
// ----------------------
const franceDir = path.join(cloneDir, 'countries', 'france');

if (!fs.existsSync(franceDir)) {
  console.error('❌ France folder not found in tv-logos repo!');
  process.exit(1);
}

const files = fs.readdirSync(franceDir);
const mapping = {};

// لكل شعار، استخدم اسم الملف (lowercase) كـ key
files.forEach(file => {
  const name = path.basename(file, path.extname(file)).toLowerCase(); // اسم القناة lowercase
  mapping[name] = `https://raw.githubusercontent.com/tv-logo/tv-logos/main/countries/france/${file}`;
});

// حفظ Mapping JSON
const outputFile = path.join(__dirname, 'logos-fr.json');
fs.writeFileSync(outputFile, JSON.stringify(mapping, null, 2));

console.log(`✅ Mapping JSON created successfully: ${outputFile}`);
