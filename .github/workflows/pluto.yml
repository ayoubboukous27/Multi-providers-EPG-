name: Pluto.tv EPG Update (multi-country + gzipped)

on:
  schedule:
    - cron: "0 6 * * *"  # يوميًا الساعة 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grab_pluto:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --------------------------
      # Clone iptv-org/epg repo
      # --------------------------
      - name: Clone iptv-org/epg
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull
          fi

      - name: Install dependencies
        run: |
          cd epg
          npm install

      # --------------------------
      # Grab Pluto.tv EPG for all countries
      # --------------------------
      - name: Grab Pluto.tv EPG
        run: |
          cd epg
          # سيقوم بالاعتماد على ملفات القنوات لكل بلد
          for file in sites/pluto.tv/pluto.tv_*.channels.xml; do
            npm run grab --- --site=pluto.tv --channels=$file
          done

      # --------------------------
      # Add country code based on XML file name and gzip
      # --------------------------
      - name: Add country code & gzip
        run: |
          mkdir -p public
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');

          // جميع ملفات القنوات لكل بلد
          const channelFiles = fs.readdirSync('epg/sites/pluto.tv').filter(f => f.endsWith('.channels.xml'));

          channelFiles.forEach(file => {
            // استنتاج country code من اسم الملف: pluto.tv_fr.channels.xml => fr
            const match = file.match(/pluto\.tv_([a-z]+)\.channels\.xml$/i);
            if (!match) return;
            const countryCode = match[1].toLowerCase();

            const inputFile = 'epg/guide.xml';
            let xml = fs.readFileSync(inputFile, 'utf8');

            // إضافة country code لكل قناة إذا لم يكن موجود
            xml = xml.replace(/(<channel[^>]*xmltv_id=")([^"]+)"/gi, (match, start, xmltvId) => {
              if (!xmltvId.includes('@')) {
                return `${start}${countryCode}@${xmltvId}"`;
              }
              return match;
            });

            const outputFile = `public/epg-pluto-${countryCode}.xml`;
            fs.writeFileSync(outputFile, xml);
            console.log(`✅ Country code '${countryCode}' added -> ${outputFile}`);

            // ضغط gzip
            const zlib = require('zlib');
            const gzip = zlib.gzipSync(xml);
            fs.writeFileSync(outputFile + '.gz', gzip);
            console.log(`✅ Compressed -> ${outputFile}.gz`);
          });
          EOF

      # --------------------------
      # Commit & Push
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-pluto-*.xml.gz
          git diff-index --quiet HEAD || git commit -m "Update Pluto.tv EPG with country codes (gzipped)"
          git pull --rebase origin main
          git push origin main
