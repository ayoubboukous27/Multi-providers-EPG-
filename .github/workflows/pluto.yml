name: Pluto FR Custom EPG

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pluto_fr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone EPG repo
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          npm install

      # --------------------------
      # استعمال ملفك فقط
      # --------------------------
      - name: Grab custom Pluto FR EPG
        run: |
          cd epg
          npm run grab --- --site=pluto.tv --channels=../data/pluto_fr_custom.channels.xml

      # --------------------------
      # حفظ فقط الناتج
      # --------------------------
      - name: Save XML
        run: |
          mkdir -p public
          cp epg/guide.xml public/epg-pluto-fr.xml

      # --------------------------
      # ضغط (اختياري لكن مهم)
      # --------------------------
      - name: Compress
        run: |
          gzip -f -k public/epg-pluto-fr.xml

      # --------------------------
      # Commit
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-pluto-fr.xml public/epg-pluto-fr.xml.gz
          git diff-index --quiet HEAD || git commit -m "Update Pluto FR custom EPG"
          git pull --rebase origin main
          git push origin main
