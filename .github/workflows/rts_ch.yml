name: Generate 10-day EPG rts.ch with logos

on:
  schedule:
    - cron: "0 8 * * *"  # تحديث يوميًا الساعة 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  epg_rts_ch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --------------------------
      # Clone iptv-org/epg
      # --------------------------
      - name: Clone EPG repository
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull
          fi

      # --------------------------
      # Install dependencies
      # --------------------------
      - name: Install EPG dependencies
        run: |
          cd epg
          npm install

      # --------------------------
      # Generate 10-day EPG for rts.ch
      # --------------------------
      - name: Generate 10-day EPG
        run: |
          cd epg
          npm run grab --- --site=rts.ch --days=20

      # --------------------------
      # Replace old icons with RTS logos
      # --------------------------
      - name: Replace old icons with RTS logos
        run: |
          node << 'EOF'
          const fs = require('fs')
          let xml = fs.readFileSync('epg/guide.xml', 'utf8')

          // تعريف الشعارات الجديدة
          const logos = {
            "RTS1.ch@SD": "https://raw.githubusercontent.com/ayoubboukous27/Event/main/Logos/rts1.png",
            "RTS2.ch@SD": "https://raw.githubusercontent.com/ayoubboukous27/Event/main/Logos/rts2.png"
          }

          for (const [xmltv_id, logo] of Object.entries(logos)) {
            const channelRegex = new RegExp(`(<channel[^>]*id=["']${xmltv_id}["'][^>]*>)([\\s\\S]*?)(</channel>)`, 'gi');
            xml = xml.replace(channelRegex, (match, start, middle, end) => {
              const cleaned = middle.replace(/<icon[^>]*\/>/gi, '') // إزالة أي شعار قديم
              return `${start}<icon src="${logo}"/>${cleaned}${end}`
            })
          }

          fs.writeFileSync('epg/guide.xml', xml)
          console.log('✅ Old icons removed, new RTS logos applied')
          EOF

      # --------------------------
      # Save XML
      # --------------------------
      - name: Save XML
        run: |
          mkdir -p public
          cp epg/guide.xml public/epg-rts-ch-10days.xml

      # --------------------------
      # Commit & Push
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-rts-ch-10days.xml
          git diff-index --quiet HEAD || git commit -m "Update 10-day EPG rts.ch with RTS logos"
          git pull --rebase origin main
          git push origin main
