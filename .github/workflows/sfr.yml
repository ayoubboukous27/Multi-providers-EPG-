name: SFR France

on:
  schedule:
    - cron: "0 4 * * *" # يوميًا الساعة 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sfr_epg:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # Checkout repository
      # --------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # --------------------------
      # Setup Node.js
      # --------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # --------------------------
      # Clone iptv-org/epg repository
      # --------------------------
      - name: Clone iptv-org/epg
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull
          fi

      # --------------------------
      # Install dependencies
      # --------------------------
      - name: Install dependencies
        run: |
          cd epg
          npm install
          npm install xml2js

      # --------------------------
      # Grab SFR TV EPG
      # --------------------------
      - name: Grab SFR TV EPG (7 days)
        run: |
          cd epg
          npx tsx scripts/commands/epg/grab.ts \
            --config=sites/tv.sfr.fr/tv.sfr.fr.config.js \
            --output=guide_sfr.xml \
            --days=7

      # --------------------------
      # Save output
      # --------------------------
      - name: Save EPG XML
        run: |
          mkdir -p public
          cp epg/guide_sfr.xml public/epg-tv-sfr.xml

      # --------------------------
      # Commit & Push
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-tv-sfr.xml
          git diff-index --quiet HEAD || git commit -m "Update 7-day EPG tv.sfr.fr"
          git pull --rebase origin main
          git push origin main
