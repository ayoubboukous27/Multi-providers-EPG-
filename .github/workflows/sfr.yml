name: SFR France EPG

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  epg_tv_sfr_7days:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # Checkout repository
      # --------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # --------------------------
      # Setup Node.js
      # --------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "node"

      # --------------------------
      # Clone iptv-org/epg
      # --------------------------
      - name: Clone iptv-org/epg
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull

      # --------------------------
      # Install dependencies
      # --------------------------
      - name: Install dependencies
        run: |
          cd epg
          npm install

      # --------------------------
      # Grab 7-day EPG for tv.sfr.fr
      # --------------------------
      - name: Grab tv.sfr.fr EPG
        run: |
          cd epg
          npx tsx scripts/commands/epg/grab.ts \
            --channels=sites/tv.sfr.fr/tv.sfr.fr.channels.xml \
            --output=guide_sfr.xml \
            --days=7

      # --------------------------
      # Save output
      # --------------------------
      - name: Save XML
        run: |
          mkdir -p public
          cp epg/guide_sfr.xml public/epg-tv-sfr-7days.xml

      # --------------------------
      # Commit & Push
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-tv-sfr-7days.xml
          git diff-index --quiet HEAD || git commit -m "Update 7-day EPG tv.sfr.fr"
          git pull --rebase origin main
          git push origin main
