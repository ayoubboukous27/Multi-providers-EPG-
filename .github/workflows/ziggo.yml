name: EPG Ziggogo.tv 7 Days Update

on:
  schedule:
    - cron: "0 15 * * *"   # تحديث يوميًا الساعة 15:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  epg_ziggogo_tv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clone EPG repo
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          npm install

      - name: Generate 7-day EPG (ziggogo.tv)
        run: |
          cd epg
          npm run grab --- --site=ziggogo.tv --days=7

      - name: Save XML
        run: |
          mkdir -p public
          cp epg/guide.xml public/epg-ziggogo-tv-7days.xml

      - name: Compress XML (gzip)
        run: |
          gzip -c public/epg-ziggogo-tv-7days.xml > public/epg-ziggogo-tv-7days.xml.gz

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-ziggogo-tv-7days.xml public/epg-ziggogo-tv-7days.xml.gz
          git diff-index --quiet HEAD || git commit -m "Update 7-day EPG ziggogo.tv"
          git pull --rebase origin main
          git push origin main
